<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enterprise Air-Canvas Pro</title>
    
    <!-- Production CDNs: Essential MediaPipe Packages -->
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>

    <style>
        :root {
            --active-color: #00ffcc;
        }
        body {
            margin: 0;
            padding: 0;
            background-color: #000000; /* Senior Request: Deep Absolute Black Matte Background */
            overflow: hidden;
            height: 100vh;
            font-family: system-ui, -apple-system, sans-serif;
            user-select: none;
        }

        /* HARDWARE ACCELERATED GRAPHICS LAYERING SETUP */
        canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            will-change: transform; /* Signals GPU layer optimization */
        }

        /* Base Layer: Stores persistent drawing strokes */
        #paintCanvas {
            z-index: 1;
        }

        /* Top Layer: Cleared every single frame for real-time skeleton render and cursor */
        #skeletonCanvas {
            z-index: 2;
        }

        /* Optimized Hidden Camera Viewport */
        #webcam {
            display: none; /* Hidden to keep UI completely dark and focused */
        }

        /* PREMIUM FLOATING CONTROLS PANEL */
        .ui-dock {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(18, 18, 18, 0.8);
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px);
            padding: 10px 24px;
            border-radius: 40px;
            display: flex;
            align-items: center;
            gap: 20px;
            z-index: 10;
            box-shadow: 0 20px 40px rgba(0,0,0,0.7);
        }

        .sys-mode {
            color: #ffffff;
            font-size: 13px;
            font-weight: 700;
            letter-spacing: 1px;
            text-transform: uppercase;
            padding: 6px 16px;
            border-radius: 20px;
            background: rgba(255,255,255,0.08);
            border-left: 3px solid var(--active-color);
        }

        .color-matrix {
            display: flex;
            gap: 12px;
        }

        .swatch {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            border: 2px solid transparent;
            cursor: pointer;
            transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .swatch:hover { transform: scale(1.1); }
        .swatch.selected {
            border-color: #ffffff;
            transform: scale(1.2);
            box-shadow: 0 0 15px var(--active-color);
        }
    </style>
</head>
<body>

    <!-- Hidden Video Data Pipeline Source -->
    <video id="webcam" autoplay playsinline></video>
    
    <!-- Render Pipelines Layers -->
    <canvas id="paintCanvas"></canvas>
    <canvas id="skeletonCanvas"></canvas>

    <!-- UI Dock Component Overlay -->
    <div class="ui-dock">
        <div id="statusTelemetry" class="sys-mode">Loading Engine...</div>
        <div class="color-matrix">
            <!-- Senior Expansion: Comprehensive High-Vibrancy Palette Selection -->
            <div class="swatch selected" style="background: #00ffcc;" data-color="#00ffcc"></div>
            <div class="swatch" style="background: #ff2a6d;" data-color="#ff2a6d"></div>
            <div class="swatch" style="background: #0579ff;" data-color="#0579ff"></div>
            <div class="swatch" style="background: #ffe600;" data-color="#ffe600"></div>
            <div class="swatch" style="background: #a020f0;" data-color="#a020f0"></div>
            <div class="swatch" style="background: #ffffff;" data-color="#ffffff"></div>
        </div>
    </div>

    <script>
        /**
         * SENIOR ENGINEERING INFRASTRUCTURE CODE
         * -----------------------------------------------------------------------
         * Purpose: Real-time high frame rate hand tracking drawing platform with 
         * skeletal overlay rendering engine.
         */
        const video = document.getElementById('webcam');
        const paintCanvas = document.getElementById('paintCanvas');
        const pCtx = paintCanvas.getContext('2d');
        const skCanvas = document.getElementById('skeletonCanvas');
        const sCtx = skCanvas.getContext('2d');
        const telemetryDisplay = document.getElementById('statusTelemetry');

        // Core Performance Variables
        let activeColor = '#00ffcc';
        const brushSize = 6;
        let lastX = null, lastY = null;

        // Optimized Anti-Jitter Variables (EMA filter strategy)
        let smoothedX = 0, smoothedY = 0;
        const temporalAlpha = 0.35; // Fine-tuned smoothing value: handles micro-shakes without inducing input lag

        // Layout Scaling Engine
        function synchronizeViewports() {
            const w = window.innerWidth;
            const h = window.innerHeight;
            
            // Scaler adjustments for Paint Canvas
            paintCanvas.width = w; paintCanvas.height = h;
            pCtx.lineCap = 'round'; pCtx.lineJoin = 'round';
            pCtx.fillStyle = '#000000';
            pCtx.fillRect(0, 0, w, h); // Fill background black securely

            // Scaler adjustments for Structural Skeleton Canvas Overlay
            skCanvas.width = w; skCanvas.height = h;
        }
        window.addEventListener('resize', synchronizeViewports);
        synchronizeViewports();

        // Color Palette Switch Management
        document.querySelectorAll('.swatch').forEach(el => {
            el.addEventListener('click', () => {
                document.querySelector('.swatch.selected').classList.remove('selected');
                el.classList.add('selected');
                activeColor = el.getAttribute('data-color');
                document.documentElement.style.setProperty('--active-color', activeColor);
            });
        });

        // Compute distance metrics between multi-dimensional vectors
        function getDistance3D(p1, p2) {
            return Math.sqrt(Math.pow(p1.x - p2.x, 2) + Math.pow(p1.y - p2.y, 2) + Math.pow(p1.z - p2.z, 2));
        }

        /**
         * STREAM ENTRY FRAME GRAPH PROCESSING LOOP
         */
        function onFrameResults(results) {
            // Step 1: Wipe the temporary skeleton canvas clean so old frames don't leave ghost trails
            sCtx.clearRect(0, 0, skCanvas.width, skCanvas.height);

            // Guard Statement: If no hand data exists, safely exit execution thread
            if (!results.multiHandLandmarks || results.multiHandLandmarks.length === 0) {
                telemetryDisplay.innerText = "Searching for Hand...";
                lastX = null;
                return;
            }

            const handLandmarks = results.multiHandLandmarks[0];

            // Render structural hand landmarks mesh on screen using MediaPipe's drawing utilities
            drawConnectors(sCtx, handLandmarks, HAND_CONNECTIONS, { color: 'rgba(255, 255, 255, 0.25)', lineWidth: 2 });
            drawLandmarks(sCtx, handLandmarks, { color: '#ff2a6d', fillColor: '#ffffff', radius: 4, lineWidth: 1 });

            // Extract Target Coordinates (Landmark 8 = Index Finger Tip)
            const rawX = (1 - handLandmarks[8].x) * skCanvas.width;
            const rawY = handLandmarks[8].y * skCanvas.height;

            // Apply Exponential Moving Average (EMA) to smooth out coordinate streams
            smoothedX = (rawX * temporalAlpha) + (smoothedX * (1 - temporalAlpha));
            smoothedY = (rawY * temporalAlpha) + (smoothedY * (1 - temporalAlpha));

            // Extract Hand Structural Boundaries for Gesture Evaluation
            const wrist = handLandmarks[0];
            const middleTip = handLandmarks[12];
            const scaleFactor = getDistance3D(wrist, middleTip); // Proportional scale normalization factor

            const indexTip = handLandmarks[8];
            const ringTip = handLandmarks[16];
            const pinkyTip = handLandmarks[20];

            // Structural Extension Queries
            const isMiddleExtended = middleTip.y < handLandmarks[10].y;
            const isRingExtended = ringTip.y < handLandmarks[14].y;
            const isPinkyExtended = pinkyTip.y < handLandmarks[18].y;
            const indexMiddleGap = getDistance3D(indexTip, middleTip);

            /**
             * FINITE STATE MACHINE (GESTURE CONTROL SYSTEM)
             */
            // State 1: Global Clear Event -> Open Hand Extended Face On
            if (isMiddleExtended && isRingExtended && isPinkyExtended && (indexMiddleGap > scaleFactor * 0.3)) {
                telemetryDisplay.innerText = "Mode: Wipe Blackboard";
                pCtx.fillStyle = '#000000';
                pCtx.fillRect(0, 0, paintCanvas.width, paintCanvas.height);
                lastX = null;
            }
            // State 2: System Navigation Hover -> Index and Middle Fingers Extended
            else if (isMiddleExtended && (indexMiddleGap < scaleFactor * 0.3)) {
                telemetryDisplay.innerText = "Mode: Hovering";
                lastX = null; // Break line drawing paths continuity
                
                // Draw a sleek target crosshair ring over the user's active cursor point
                sCtx.beginPath();
                sCtx.arc(smoothedX, smoothedY, 12, 0, 2 * Math.PI);
                sCtx.strokeStyle = '#ffffff';
                sCtx.lineWidth = 2;
                sCtx.stroke();
            }
            // State 3: Active Paint Generation -> Only Index Pointer Extended
            else {
                telemetryDisplay.innerText = "Mode: Drawing";

                if (lastX !== null && lastY !== null) {
                    pCtx.beginPath();
                    pCtx.strokeStyle = activeColor;
                    pCtx.lineWidth = brushSize;
                    pCtx.moveTo(lastX, lastY);
                    pCtx.lineTo(smoothedX, smoothedY);
                    pCtx.stroke();
                }
                lastX = smoothedX;
                lastY = smoothedY;
            }
        }

        /**
         * APPLICATION SYSTEM INITIALIZATION EXECUTABLE
         */
        const handTrackingEngine = new Hands({
            locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
        });

        // Performance Optimization Engine Configuration Parameters
        handTrackingEngine.setOptions({
            maxNumHands: 1,
            modelComplexity: 1, // Balanced setup layer
            minDetectionConfidence: 0.65,
            minTrackingConfidence: 0.65
        });

        handTrackingEngine.onResults(onFrameResults);

        // Hardware Camera Initialization Capture Controller
        const capturePipeline = new Camera(video, {
            onFrame: async () => {
                await handTrackingEngine.send({ image: video });
            },
            width: 640,
            height: 480
        });

        capturePipeline.start()
            .then(() => telemetryDisplay.innerText = "System Ready")
            .catch(err => {
                telemetryDisplay.innerText = "Camera Access Blocked";
                console.error("Critical System Fail Initialization:", err);
            });
    </script>
</body>
</html>
